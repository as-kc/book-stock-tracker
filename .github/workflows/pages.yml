name: Publish GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/pages.yml
      - pyproject.toml
      - uv.lock
      - stock-tracker.db
      - src/book_stock_tracker/**

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Install project dependencies
        run: uv sync --locked

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Generate static stock page
        run: uv run python -m book_stock_tracker.export_pages --database stock-tracker.db --output-dir build/pages

      - name: Smoke check generated site
        run: test -f build/pages/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
